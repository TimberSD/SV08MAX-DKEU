[controller_fan Bed_SSR_Fan]
pin: PE14  
max_power: 1.0               
kick_start_time: 0.5
fan_speed: 1.0
idle_timeout: 600
stepper:
heater: heater_bed
tachometer_pin: PB10
tachometer_ppr: 2
tachometer_poll_interval: 0.001375

[gcode_arcs]                       
resolution: 1.0                    

# [idle_timeout]
# gcode: _IDLE_TIMEOUT
# timeout: 1800

[idle_timeout]
gcode:
    _DEMON_IDLE_TIMEOUT
timeout: 3600

[save_variables]
#filename =/home/sovol/printer_data/config/saved_variables.cfg
filename = ~/demon_vars.cfg

[force_move]
enable_force_move: True


[include shell_command.cfg]

